<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Lyrics Studio</title>
<style>
  :root {
    --bg: #14151a;
    --panel: #1b1d23;
    --panel-2: #21232a;
    --border: #2a2c34;
    --text: #e8e9ed;
    --muted: #888c98;
    --accent: #7fa8e0;
    --accent-text: #0e1420;
    --warn: #d9a85c;
    --danger: #d9736f;
    --danger-bg: #2e2224;
    --ok: #6bbf94;
    --mono: 'SF Mono', 'Consolas', 'Monaco', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 12px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    padding: 24px;
    padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
  }
  .wrap { max-width: 1100px; margin: 0 auto; }

  header { margin-bottom: 16px; }
  h1 { font-size: 19px; font-weight: 700; margin: 0 0 3px; letter-spacing: 0.2px; }
  .sub { font-size: 12.5px; color: var(--muted); }

  /* segmented control (raw vs musixmatch) */
  .segmented {
    display: flex; gap: 4px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 4px; margin-bottom: 12px;
  }
  .seg {
    flex: 1; background: transparent; border: none; color: var(--muted);
    padding: 9px 10px; border-radius: 7px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: var(--sans);
  }
  .seg.active { background: var(--accent); color: var(--accent-text); }

  /* meta bar - only shown in musixmatch mode */
  .meta-bar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 12px;
    display: none;
  }
  .meta-bar.visible { display: block; }
  .meta-row { display: flex; gap: 10px; }
  .meta-row + .meta-row { margin-top: 8px; }
  .meta-field { flex: 1; min-width: 0; }
  .meta-field label {
    display: block; font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .meta-field input {
    width: 100%; background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 10px; border-radius: 8px;
    font-family: var(--sans); font-size: 13px;
  }
  .meta-field input:focus { outline: none; border-color: var(--accent); }
  .meta-toggle {
    background: none; border: none; color: var(--muted); font-size: 11px;
    cursor: pointer; padding: 6px 2px 0; text-decoration: underline;
  }
  .meta-more { display: none; }
  .meta-more.open { display: flex; }

  /* toolbar row: badge + more options */
  .toolbar-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; gap: 8px; flex-wrap: wrap;
  }
  .badge-row { display: none; }
  .badge-row.visible { display: block; }
  .badge {
    display: inline-block; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.4px;
    padding: 4px 9px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted);
    background: var(--panel);
  }
  .badge.ok { color: var(--ok); border-color: var(--ok); }
  .badge.warn { color: var(--warn); border-color: var(--warn); }

  button.btn {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    padding: 8px 14px; border-radius: 8px; font-size: 12.5px; font-weight: 600;
    cursor: pointer; font-family: var(--sans);
  }
  button.btn.primary { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
  button.btn.ghost { background: transparent; color: var(--muted); border-color: var(--border); }
  button.btn:active { transform: translateY(1px); }
  button.btn.copied { background: var(--ok); color: #0e1420; border-color: var(--ok); }

  /* more options dropdown */
  .more-options-panel {
    display: none;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 14px;
  }
  .more-options-panel.open { display: block; }
  .option-group { margin-bottom: 14px; }
  .option-group:last-child { margin-bottom: 0; }
  .option-group > label.section-label {
    display: block; font-size: 10.5px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;
  }
  .checkbox-row {
    display: flex; align-items: center; gap: 8px; font-size: 13px;
    padding: 5px 0; cursor: pointer; color: var(--text);
  }
  .checkbox-row input { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
  .action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
  .replace-tool .replace-row { display: flex; gap: 8px; margin-top: 6px; }
  .replace-tool input {
    flex: 1; min-width: 0; background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); padding: 8px 10px; border-radius: 8px;
    font-family: var(--sans); font-size: 13px;
  }
  .replace-tool input:focus { outline: none; border-color: var(--accent); }
  .replace-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }

  /* main grid */
  .editor-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .btn-row { display: flex; gap: 8px; }

  .mode-box { display: none; flex: 1; }
  .mode-box.active { display: flex; flex-direction: column; flex: 1; }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.7;
    padding: 14px;
    resize: none;
    outline: none;
    flex: 1;
    min-height: 40vh;
  }

  .notice { font-size: 12px; color: var(--warn); margin: 0 14px 12px; white-space: pre-line; }

  .editor-wrap { position: relative; flex: 1; min-height: 40vh; }
  .editor-wrap textarea, .editor-wrap .backdrop {
    position: absolute; inset: 0; margin: 0; min-height: 0; height: 100%;
    overflow: auto;
  }
  .backdrop {
    pointer-events: none;
    white-space: pre-wrap;
    word-break: break-word;
    color: transparent;
    padding: 14px;
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.7;
  }
  .bd-line {
    color: transparent;
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
  }
  .bd-line.over {
    background: var(--danger-bg);
    border-left: 2px solid var(--danger);
    padding-left: 4px;
    margin-left: -6px;
  }
  .editor-wrap textarea {
    background: transparent;
    color: var(--text);
    caret-color: var(--text);
    z-index: 1;
  }

  .warnings { margin: 0 14px 12px; font-size: 12px; color: var(--warn); white-space: pre-line; }

  .legend {
    margin-top: 14px; font-size: 11.5px; color: var(--muted);
    display: flex; gap: 8px; align-items: center;
  }
  .legend .dot { width: 8px; height: 8px; border-radius: 2px; background: var(--danger); display: inline-block; }

  @media (max-width: 760px) {
    body { padding: 14px; }
    h1 { font-size: 17px; }
    .editor-grid { grid-template-columns: 1fr; gap: 12px; }
    .meta-row { flex-direction: column; gap: 8px; }
    textarea, .backdrop { font-size: 16px; padding: 12px; }
    textarea { min-height: 30vh; }
    .editor-wrap { min-height: 30vh; }
    .panel-header { flex-direction: column; align-items: stretch; }
    .btn-row { justify-content: stretch; }
    button.btn { flex: 1; min-height: 38px; }
    .replace-tool .replace-row { flex-direction: column; }
    .toolbar-row { flex-direction: column; align-items: stretch; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Lyrics Studio</h1>
    <div class="sub">Format raw lyrics or convert Musixmatch/TTML — edit the result directly, live.</div>
  </header>

  <div class="segmented">
    <button class="seg active" data-mode="raw">Raw Lyrics</button>
    <button class="seg" data-mode="musix">Musixmatch / TTML</button>
  </div>

  <div class="meta-bar" id="metaBar">
    <div class="meta-row">
      <div class="meta-field"><label>Title</label><input id="title" placeholder="Song title"></div>
      <div class="meta-field"><label>Artist</label><input id="artist" placeholder="Artist name"></div>
    </div>
    <div class="meta-row meta-more" id="metaMore">
      <div class="meta-field"><label>Album</label><input id="album" placeholder="Optional"></div>
      <div class="meta-field"><label>Writer</label><input id="writer" placeholder="Optional"></div>
    </div>
    <button class="meta-toggle" id="metaToggle">+ album / writer</button>
  </div>

  <div class="toolbar-row">
    <div class="badge-row" id="badgeRow"><span class="badge" id="formatBadge">waiting for input</span></div>
    <button class="btn ghost" id="moreOptionsBtn">⋯ More options</button>
  </div>

  <div class="more-options-panel" id="moreOptionsPanel">
    <div class="option-group">
      <label class="section-label">Automatic fixes</label>
      <label class="checkbox-row"><input type="checkbox" id="toggleCap" checked> Capitalize line starts &amp; standalone "I"</label>
      <label class="checkbox-row"><input type="checkbox" id="toggleApos" checked> Fix clipped-word apostrophes (em → 'em, goin → goin')</label>
      <label class="checkbox-row"><input type="checkbox" id="toggleComma" checked> Fix spacing around commas</label>
    </div>
    <div class="option-group">
      <label class="section-label">Quick tools (apply once to Result)</label>
      <div class="action-buttons">
        <button class="btn ghost" id="collapseBlanksBtn">Collapse extra blank lines</button>
        <button class="btn ghost" id="trimSpacesBtn">Trim trailing spaces</button>
      </div>
    </div>
    <div class="option-group replace-tool">
      <label class="section-label">Find &amp; replace (applies to Result)</label>
      <div class="replace-row">
        <input type="text" id="findInput" placeholder="Find..." value="****">
        <input type="text" id="replaceInput" placeholder="Replace with...">
        <button class="btn primary" id="replaceAllBtn">Replace All</button>
      </div>
      <div class="replace-hint">Defaults to finding **** (handy for filling in Musixmatch's censored words) — leave "replace with" blank to just remove matches.</div>
    </div>
  </div>

  <div class="editor-grid">
    <div class="panel">
      <div class="panel-header"><span id="inputLabel">Raw Lyrics</span></div>

      <div class="mode-box active" id="rawModeBox">
        <textarea id="rawInput" placeholder="Paste plain lyrics here..." spellcheck="false"></textarea>
      </div>

      <div class="mode-box" id="musixModeBox">
        <textarea id="musixInput" placeholder="Paste [mm:ss.xx] timed lyrics, or a TTML export..." spellcheck="false"></textarea>
        <div class="notice" id="parseNotice"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="stats" id="resultStats">0 lines</div>
        <div class="btn-row">
          <button class="btn ghost" id="regenBtn" title="Re-generate from Input, discarding manual edits">↻</button>
          <button class="btn" id="copyBtn">Copy</button>
          <button class="btn primary" id="downloadBtn">Download .txt</button>
        </div>
      </div>
      <div class="editor-wrap">
        <div class="backdrop" id="backdrop" aria-hidden="true"></div>
        <textarea id="resultBox" placeholder="Your formatted lyrics will show up here — edit freely." spellcheck="false"></textarea>
      </div>
      <div class="warnings" id="warnings"></div>
    </div>
  </div>

  <div class="legend"><span class="dot"></span>Line over 70 characters</div>
</div>

<script>
/* ================= shared text-formatting engine ================= */
const CHAR_LIMIT = 70;

const FRONT_CLIPPED = new Set([
  'em','cause','cuz','cus','cos','coz','bout','round','cept','nuff',
  'gainst','fraid','tis','twas','kay','fore','neath','specially','sup'
]);

const BACK_CLIPPED = new Set([
  'nothin','somethin','anythin','everythin','goin','doin','comin','runnin',
  'walkin','talkin','thinkin','feelin','tryin','playin','singin','dancin',
  'lookin','waitin','cryin','flyin','dyin','livin','lovin','hopin','wishin',
  'prayin','sayin','makin','takin','breakin','wakin','shakin','holdin',
  'standin','fallin','callin','tellin','gettin','lettin','puttin','keepin',
  'movin','growin','knowin','showin','bein','seein','workin','drivin',
  'chasin','wonderin','smilin','cheatin','leavin','dreamin','screamin',
  'missin','kissin','huggin','fightin','watchin','jumpin','rockin','rollin',
  'shinin','burnin','turnin','learnin','teachin','readin','writin',
  'sleepin','swingin','bringin','findin','askin','beggin','tradin',
  'hidin','ridin','shootin','fillin','sendin','spendin','endin','startin',
  'stoppin','openin','closin','changin','chillin','trippin','slippin'
]);

const REAL_IN_WORDS = new Set([
  'in','pin','win','bin','fin','gin','kin','sin','tin','din','min','chin',
  'shin','thin','twin','skin','coin','ruin','cabin','robin','satin','basin',
  'muffin','puffin','cousin','virgin','margin','origin','protein','vitamin',
  'javelin','dolphin','penguin','pumpkin','napkin','latin','akin','ain'
]);

// tokenizer includes both straight (') and curly (’) apostrophes so words that
// ALREADY have an apostrophe (typed or pasted with a curly quote) are captured
// whole and never touched again — this is what fixes the double-apostrophe bug.
const WORD_RE = /[A-Za-z'’]+/g;

function processWordApostrophe(word) {
  if (word.includes("'") || word.includes('\u2019')) return word; // already has one, leave it alone
  const lower = word.toLowerCase();
  if (FRONT_CLIPPED.has(lower)) return "'" + word;
  if (BACK_CLIPPED.has(lower)) return word + "'";
  if (lower.length > 4 && lower.endsWith('in') && !REAL_IN_WORDS.has(lower)) return word + "'";
  return word;
}

function capitalizeFirstLetter(line) {
  const idx = line.search(/[a-zA-Z]/);
  if (idx === -1) return line;
  return line.slice(0, idx) + line[idx].toUpperCase() + line.slice(idx + 1);
}

function fixCommaSpacing(line) {
  return line
    .replace(/\s+,/g, ',')          // no space before a comma
    .replace(/,(?=\S)/g, ', ')      // exactly one space after, unless end of line
    .replace(/,\s{2,}/g, ', ');     // collapse multiple spaces after a comma
}

function processLine(rawLine, opts) {
  opts = opts || { cap: true, apos: true, comma: true };
  if (rawLine.trim() === '') return '';
  let line = rawLine;
  if (opts.comma) line = fixCommaSpacing(line);
  if (opts.apos) line = line.replace(WORD_RE, processWordApostrophe);
  if (opts.cap) {
    line = line.replace(/\bi\b/g, 'I');
    line = capitalizeFirstLetter(line);
  }
  return line;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function escapeRegex(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

/* ================= LRC / TTML engine ================= */

function unescapeJsonish(raw) {
  let text = raw.trim();
  text = text.replace(/^["']?ttml["']?\s*:\s*/i, '');
  if ((text.startsWith('"') && text.endsWith('"')) || (text.startsWith("'") && text.endsWith("'"))) {
    text = text.slice(1, -1);
  }
  text = text.replace(/\\"/g, '"').replace(/\\n/g, '\n').replace(/\\t/g, '\t').replace(/\\\\/g, '\\');
  return text;
}

function detectFormat(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return 'empty';
  const unescaped = unescapeJsonish(trimmed);
  if (/<tt[\s>]/i.test(unescaped)) return 'ttml';
  if (/\[\d{1,2}:\d{2}(\.\d+)?\]/.test(trimmed)) return 'lrc';
  return 'unknown';
}

function msToLrcTimestamp(ms) {
  const totalSec = ms / 1000;
  const min = Math.floor(totalSec / 60);
  const sec = totalSec - min * 60;
  return `[${String(min).padStart(2, '0')}:${sec.toFixed(2).padStart(5, '0')}]`;
}

function buildMetaHeader(meta) {
  const out = [];
  if (meta.title) out.push(`[ti:${meta.title}]`);
  if (meta.artist) out.push(`[ar:${meta.artist}]`);
  if (meta.album) out.push(`[al:${meta.album}]`);
  if (meta.writer) out.push(`[au:${meta.writer}]`);
  out.push(`[offset:0]`);
  return out;
}

function parseLrcInput(raw) {
  const normalized = raw.replace(/\\n/g, '\n');
  const rawLines = normalized.split('\n').map(l => l.trim()).filter(l => l.length);
  const lines = [];
  const lineRe = /^\[(\d{1,2}):(\d{2})(?:\.(\d{1,3}))?\]\s*(.*)$/;
  for (const line of rawLines) {
    const m = line.match(lineRe);
    if (!m) { lines.push({ raw: line, time: null, text: line, malformed: true }); continue; }
    const min = parseInt(m[1], 10);
    const sec = parseInt(m[2], 10);
    let frac = m[3] || '0';
    frac = frac.padEnd(2, '0').slice(0, 2);
    lines.push({ time: `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}.${frac}`, text: m[4], malformed: false });
  }
  return lines;
}

function buildLrcFromTimed(lines, meta, opts) {
  const out = buildMetaHeader(meta);
  out.push('');
  for (const l of lines) {
    const formatted = processLine(l.text, opts);
    out.push(l.malformed ? formatted : `[${l.time}]${formatted}`);
  }
  return out.join('\n');
}

function parseTimecode(tc) {
  if (!tc) return null;
  tc = tc.trim();
  if (/^[\d.]+s$/i.test(tc)) return Math.round(parseFloat(tc) * 1000);
  if (/^[\d.]+t$/i.test(tc)) return null;
  const parts = tc.split(':');
  if (parts.length === 3) {
    const [h, m, s] = parts;
    return Math.round((parseInt(h, 10) * 3600 + parseInt(m, 10) * 60 + parseFloat(s)) * 1000);
  }
  if (parts.length === 2) {
    const [m, s] = parts;
    return Math.round((parseInt(m, 10) * 60 + parseFloat(s)) * 1000);
  }
  if (/^[\d.]+$/.test(tc)) return Math.round(parseFloat(tc) * 1000);
  return null;
}

function parseTtmlInput(raw) {
  const xmlText = unescapeJsonish(raw);
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'application/xml');
  if (doc.getElementsByTagName('parsererror').length) {
    throw new Error('Could not parse that as TTML/XML — check for missing tags or broken escaping.');
  }
  const divs = Array.from(doc.getElementsByTagName('div'));
  const divList = divs.length ? divs : [doc];
  let anyTiming = false;
  const sections = [];
  for (const div of divList) {
    const ps = Array.from(div.getElementsByTagName('p'));
    const sectionLines = [];
    for (const p of ps) {
      const text = p.textContent.replace(/\s+/g, ' ').trim();
      if (!text) continue;
      const begin = p.getAttribute('begin');
      const ms = begin ? parseTimecode(begin) : null;
      if (ms !== null) anyTiming = true;
      sectionLines.push({ text, ms });
    }
    if (sectionLines.length) sections.push(sectionLines);
  }
  return { sections, timed: anyTiming };
}

function buildFromTtml(parsed, meta, opts) {
  if (parsed.timed) {
    const out = buildMetaHeader(meta);
    out.push('');
    for (const section of parsed.sections) {
      for (const line of section) {
        const formatted = processLine(line.text, opts);
        out.push(line.ms !== null ? `${msToLrcTimestamp(line.ms)}${formatted}` : formatted);
      }
      out.push('');
    }
    while (out.length && out[out.length - 1] === '') out.pop();
    return { text: out.join('\n'), ext: 'lrc' };
  } else {
    const out = [];
    for (const section of parsed.sections) {
      out.push(section.map(l => processLine(l.text, opts)).join('\n'));
    }
    return { text: out.join('\n\n'), ext: 'txt' };
  }
}

function checkParseIssues(flatLines) {
  const malformed = flatLines.filter(l => l.malformed);
  if (!malformed.length) return '';
  let msg = `${malformed.length} line(s) didn't match the expected timestamp format and were kept as plain text:\n`;
  msg += malformed.slice(0, 5).map(l => `  • ${l.text}`).join('\n');
  return msg;
}

/* ================= Result analysis (live) ================= */

function computeResultAnalysis(text, opts) {
  const lines = text.split('\n');
  let overCount = 0;
  let longWordCount = 0;
  let consecutive = 0;
  let sawBreak = true;
  let noBreakWarning = false;
  let lyricLineCount = 0;
  let wordTotal = 0;

  for (const line of lines) {
    const trimmed = line.trim();
    const isMeta = /^\[(ti|ar|al|au|offset):/i.test(trimmed);
    if (trimmed === '') { sawBreak = true; consecutive = 0; continue; }
    if (isMeta) continue;

    lyricLineCount++;
    consecutive++;
    const stripped = line.replace(/^\[\d{1,2}:\d{2}(?:\.\d+)?\]\s?/, '');
    if (stripped.length > CHAR_LIMIT) overCount++;
    const wc = stripped.trim().split(/\s+/).filter(Boolean).length;
    wordTotal += wc;
    if (opts.checkWordCount && wc > 6) longWordCount++;
    if (consecutive > 10 && !sawBreak) noBreakWarning = true;
    sawBreak = false;
  }

  return { lyricLineCount, overCount, longWordCount, noBreakWarning, wordTotal };
}

function renderBackdrop(text) {
  const lines = text.split('\n');
  const html = lines.map(line => {
    const trimmed = line.trim();
    const isMeta = /^\[(ti|ar|al|au|offset):/i.test(trimmed);
    const stripped = line.replace(/^\[\d{1,2}:\d{2}(?:\.\d+)?\]\s?/, '');
    const over = !isMeta && stripped.length > CHAR_LIMIT;
    const cls = over ? 'bd-line over' : 'bd-line';
    const content = escapeHtml(line) || ' ';
    return `<span class="${cls}">${content}</span>`;
  }).join('\n');
  backdrop.innerHTML = html;
}

/* ================= UI wiring ================= */

const titleEl = document.getElementById('title');
const artistEl = document.getElementById('artist');
const albumEl = document.getElementById('album');
const writerEl = document.getElementById('writer');
const metaBar = document.getElementById('metaBar');
const metaToggle = document.getElementById('metaToggle');
const metaMore = document.getElementById('metaMore');

const segs = document.querySelectorAll('.seg');
const rawModeBox = document.getElementById('rawModeBox');
const musixModeBox = document.getElementById('musixModeBox');
const rawInput = document.getElementById('rawInput');
const musixInput = document.getElementById('musixInput');
const inputLabel = document.getElementById('inputLabel');
const badgeRow = document.getElementById('badgeRow');
const formatBadge = document.getElementById('formatBadge');
const parseNotice = document.getElementById('parseNotice');

const moreOptionsBtn = document.getElementById('moreOptionsBtn');
const moreOptionsPanel = document.getElementById('moreOptionsPanel');
const toggleCap = document.getElementById('toggleCap');
const toggleApos = document.getElementById('toggleApos');
const toggleComma = document.getElementById('toggleComma');
const collapseBlanksBtn = document.getElementById('collapseBlanksBtn');
const trimSpacesBtn = document.getElementById('trimSpacesBtn');
const findInput = document.getElementById('findInput');
const replaceInput = document.getElementById('replaceInput');
const replaceAllBtn = document.getElementById('replaceAllBtn');

const resultBox = document.getElementById('resultBox');
const backdrop = document.getElementById('backdrop');
const resultStats = document.getElementById('resultStats');
const warningsEl = document.getElementById('warnings');
const copyBtn = document.getElementById('copyBtn');
const downloadBtn = document.getElementById('downloadBtn');
const regenBtn = document.getElementById('regenBtn');

let currentInputMode = 'raw';
let currentExt = 'txt';

metaToggle.addEventListener('click', () => {
  metaMore.classList.toggle('open');
  metaToggle.textContent = metaMore.classList.contains('open') ? '– hide extra fields' : '+ album / writer';
});

moreOptionsBtn.addEventListener('click', () => {
  moreOptionsPanel.classList.toggle('open');
});

segs.forEach(btn => {
  btn.addEventListener('click', () => {
    segs.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentInputMode = btn.dataset.mode;

    rawModeBox.classList.toggle('active', currentInputMode === 'raw');
    musixModeBox.classList.toggle('active', currentInputMode === 'musix');
    metaBar.classList.toggle('visible', currentInputMode === 'musix');
    badgeRow.classList.toggle('visible', currentInputMode === 'musix');
    inputLabel.textContent = currentInputMode === 'raw' ? 'Raw Lyrics' : 'Musixmatch / TTML';

    generateResult(true);
  });
});

function getMeta() {
  return {
    title: titleEl.value.trim(),
    artist: artistEl.value.trim(),
    album: albumEl.value.trim(),
    writer: writerEl.value.trim(),
  };
}

function getFormatOpts() {
  return { cap: toggleCap.checked, apos: toggleApos.checked, comma: toggleComma.checked };
}

function generateResult(force) {
  if (!force && document.activeElement === resultBox) return; // don't clobber manual edits
  const opts = getFormatOpts();

  if (currentInputMode === 'raw') {
    const rawLines = rawInput.value.split('\n');
    resultBox.value = rawLines.map(l => processLine(l, opts)).join('\n');
    currentExt = 'txt';
    parseNotice.textContent = '';
  } else {
    const raw = musixInput.value;
    const fmt = detectFormat(raw);
    const labels = { empty: 'waiting for input', ttml: 'TTML detected', lrc: 'timed lyrics detected', unknown: 'format not recognized' };
    formatBadge.textContent = labels[fmt];
    formatBadge.className = 'badge' + (fmt === 'ttml' || fmt === 'lrc' ? ' ok' : fmt === 'unknown' ? ' warn' : '');

    if (fmt === 'empty') { resultBox.value = ''; parseNotice.textContent = ''; currentExt = 'txt'; }
    else if (fmt === 'unknown') { parseNotice.textContent = "Couldn't tell if that's timed lyrics or TTML — check the formatting."; }
    else {
      try {
        const meta = getMeta();
        if (fmt === 'lrc') {
          const lines = parseLrcInput(raw);
          resultBox.value = buildLrcFromTimed(lines, meta, opts);
          currentExt = 'lrc';
          parseNotice.textContent = checkParseIssues(lines);
        } else {
          const parsed = parseTtmlInput(raw);
          const result = buildFromTtml(parsed, meta, opts);
          resultBox.value = result.text;
          currentExt = result.ext;
          parseNotice.textContent = checkParseIssues(parsed.sections.flat());
        }
      } catch (e) {
        parseNotice.textContent = e.message || 'Something went wrong parsing that input.';
      }
    }
  }
  updateResultView();
}

function updateResultView() {
  const text = resultBox.value;
  renderBackdrop(text);
  const analysis = computeResultAnalysis(text, { checkWordCount: currentExt === 'lrc' });

  let statsText = `${analysis.lyricLineCount} line${analysis.lyricLineCount !== 1 ? 's' : ''} • ${analysis.wordTotal} words`;
  if (analysis.overCount) statsText += ` • ${analysis.overCount} over ${CHAR_LIMIT} chars`;
  resultStats.textContent = statsText;

  const warnings = [];
  if (analysis.longWordCount) warnings.push(`${analysis.longWordCount} line(s) are longer than ~6 words — DistroKid recommends short sync lines.`);
  if (analysis.noBreakWarning) warnings.push(`No blank-line section breaks detected — DistroKid suggests not exceeding ~10 lines without a break.`);
  warningsEl.textContent = warnings.length ? '⚠ ' + warnings.join('\n') : '';

  downloadBtn.textContent = `Download .${currentExt}`;
}

rawInput.addEventListener('input', () => generateResult(false));
musixInput.addEventListener('input', () => generateResult(false));
[titleEl, artistEl, albumEl, writerEl].forEach(el => {
  el.addEventListener('input', () => { if (currentInputMode === 'musix') generateResult(false); });
});
[toggleCap, toggleApos, toggleComma].forEach(el => {
  el.addEventListener('change', () => generateResult(true));
});

resultBox.addEventListener('input', updateResultView);
resultBox.addEventListener('scroll', () => { backdrop.scrollTop = resultBox.scrollTop; backdrop.scrollLeft = resultBox.scrollLeft; });

regenBtn.addEventListener('click', () => generateResult(true));

collapseBlanksBtn.addEventListener('click', () => {
  resultBox.value = resultBox.value.replace(/\n{3,}/g, '\n\n');
  updateResultView();
});

trimSpacesBtn.addEventListener('click', () => {
  resultBox.value = resultBox.value.split('\n').map(l => l.replace(/[ \t]+$/, '')).join('\n');
  updateResultView();
});

replaceAllBtn.addEventListener('click', () => {
  const findVal = findInput.value;
  if (!findVal) return;
  const replaceVal = replaceInput.value; // blank means "remove the matches"
  const re = new RegExp(escapeRegex(findVal), 'gi');
  resultBox.value = resultBox.value.replace(re, replaceVal);
  updateResultView();
});

copyBtn.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(resultBox.value);
    copyBtn.textContent = 'Copied!';
    copyBtn.classList.add('copied');
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = resultBox.value;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    copyBtn.textContent = 'Copied!';
    copyBtn.classList.add('copied');
  }
  setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1200);
});

downloadBtn.addEventListener('click', () => {
  if (!resultBox.value) return;
  const meta = getMeta();
  const filename = `${meta.artist ? meta.artist + ' - ' : ''}${meta.title || 'lyrics'}.${currentExt}`.replace(/[\\/:*?"<>|]/g, '');
  const blob = new Blob([resultBox.value], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
});

updateResultView();
</script>
</body>
</html>
